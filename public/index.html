<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 Farm Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            background: #0a0c10;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00ff88;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stat {
            background: #14181f;
            padding: 12px 20px;
            border-radius: 10px;
            border-left: 3px solid #00ff88;
            min-width: 100px;
        }
        .stat .num {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .stat .lbl {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
        }
        .stat .num.found {
            color: #00ff88;
        }
        .stat .num.error {
            color: #ff6b6b;
        }
        .api-status {
            background: #14181f;
            border-radius: 10px;
            padding: 16px 20px;
            margin: 16px 0;
            border: 1px solid #1e232c;
        }
        .api-status h3 {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }
        .api-item {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            background: #0a0c10;
        }
        .api-item .chain {
            font-weight: 600;
        }
        .api-item .status {
            margin-left: 8px;
        }
        .api-item .status.working {
            color: #00ff88;
        }
        .api-item .status.dead {
            color: #ff6b6b;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .actions button {
            background: #1e232c;
            border: 1px solid #2a2f3a;
            color: #ccc;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .actions .export-btn {
            background: #00ff88;
            color: #0a0c10;
            border: none;
            font-weight: 700;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        th {
            text-align: left;
            padding: 8px;
            color: #888;
            border-bottom: 1px solid #1e232c;
            position: sticky;
            top: 0;
            background: #14181f;
            font-size: 0.6rem;
            text-transform: uppercase;
        }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid #1a1f28;
        }
        .addr {
            color: #66d9ff;
        }
        .key {
            color: #ffaa66;
        }
        .bal {
            color: #00ff88;
            font-weight: 600;
        }
        .chain-badge {
            background: #2a2f3a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.6rem;
            color: #3a3f4a;
            text-align: center;
            border-top: 1px solid #1e232c;
            padding-top: 14px;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-badge.running {
            background: #00ff88;
            color: #0a0c10;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2f3a;
        }
        @media (max-width: 600px) {
            .stats {
                gap: 8px;
            }
            .stat {
                padding: 8px 12px;
                min-width: 70px;
            }
            .stat .num {
                font-size: 1rem;
            }
            .api-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔓 BruteForce Farm</h1>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
            <span class="status-badge running" id="statusBadge">● RUNNING</span>
            <span style="color:#888;font-size:0.7rem;" id="lastUpdate">Loading...</span>
        </div>

        <div class="stats" id="stats">
            <div class="stat"><div class="num" id="gen">0</div><div class="lbl">Generated</div></div>
            <div class="stat"><div class="num" id="scan">0</div><div class="lbl">Scanned</div></div>
            <div class="stat"><div class="num found" id="found">0</div><div class="lbl">Found</div></div>
            <div class="stat"><div class="num" id="speed">0</div><div class="lbl">Wallets/min</div></div>
            <div class="stat"><div class="num" id="runtime">0s</div><div class="lbl">Runtime</div></div>
            <div class="stat"><div class="num error" id="errors">0</div><div class="lbl">Errors</div></div>
        </div>

        <!-- API Status -->
        <div class="api-status">
            <h3>🔌 API Health Status</h3>
            <div class="api-grid" id="apiGrid">
                <div style="color:#888;font-size:0.7rem;">Loading API status...</div>
            </div>
        </div>

        <div class="actions">
            <button class="export-btn" onclick="exportWallets()">📥 Export TXT</button>
            <button onclick="refreshData()">🔄 Refresh</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Private Key</th>
                        <th>Address</th>
                        <th>Chain</th>
                        <th>Balance</th>
                        <th>Found At</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center;color:#4a4f5a;padding:20px;">Loading wallets...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <i class="fas fa-skull"></i> 24x7 Farm &bull; API health checked every 5 min &bull;
            <span id="walletCount">0</span> wallets found
        </div>
    </div>

    <script>
        // ================================================================
        //  API HELPERS
        // ================================================================
        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(endpoint);
                if (!res.ok) throw new Error('API error');
                return await res.json();
            } catch (e) {
                console.error('API error:', e);
                return null;
            }
        }

        // ================================================================
        //  LOAD API STATUS
        // ================================================================
        async function loadAPIStatus() {
            const data = await fetchAPI('/api/health');
            if (data && data.apiStatus) {
                const grid = document.getElementById('apiGrid');
                let html = '';
                const statuses = data.apiStatus;
                for (const [chain, status] of Object.entries(statuses)) {
                    const isWorking = status.includes('✅');
                    html += `
                        <div class="api-item">
                            <span class="chain">${chain.toUpperCase()}</span>
                            <span class="status ${isWorking ? 'working' : 'dead'}">${status}</span>
                        </div>
                    `;
                }
                grid.innerHTML = html || '<div style="color:#888;font-size:0.7rem;">No API status available</div>';
            }
        }

        // ================================================================
        //  LOAD STATS
        // ================================================================
        async function loadStats() {
            const data = await fetchAPI('/api/stats');
            if (data) {
                document.getElementById('gen').textContent = data.generated || 0;
                document.getElementById('scan').textContent = data.scanned || 0;
                document.getElementById('found').textContent = data.found || 0;
                document.getElementById('speed').textContent = data.speed || 0;
                document.getElementById('runtime').textContent = (data.runtime || 0) + 's';
                document.getElementById('errors').textContent = data.errors || 0;
                document.getElementById('walletCount').textContent = data.wallets_found || 0;
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            }
        }

        // ================================================================
        //  LOAD WALLETS
        // ================================================================
        async function loadWallets() {
            const data = await fetchAPI('/api/wallets/recent');
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML =
                    `<tr><td colspan="6" style="text-align:center;color:#4a4f5a;padding:20px;">No wallets found yet. Farm is running...</td></tr>`;
                return;
            }
            let html = '';
            data.forEach((w, i) => {
                const addr = w.address || 'unknown';
                const shortAddr = addr.length > 16 ? addr.slice(0, 12) + '…' + addr.slice(-6) : addr;
                const keyShort = w.privateKey ? w.privateKey.slice(0, 10) + '…' : '—';
                html += `<tr>
                    <td>${i+1}</td>
                    <td class="key" title="${w.privateKey || ''}">${keyShort}</td>
                    <td class="addr" title="${addr}">${shortAddr}</td>
                    <td><span class="chain-badge">${(w.chain || '?').toUpperCase()}</span></td>
                    <td class="bal">${(parseFloat(w.balance) || 0).toFixed(8)}</td>
                    <td style="color:#666;font-size:0.65rem;">${w.found_at ? new Date(w.found_at).toLocaleString() : '—'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // ================================================================
        //  REFRESH
        // ================================================================
        async function refreshData() {
            await Promise.all([loadAPIStatus(), loadStats(), loadWallets()]);
        }

        // ================================================================
        //  EXPORT
        // ================================================================
        async function exportWallets() {
            const data = await fetchAPI('/api/wallets');
            if (!data || data.length === 0) return alert('No wallets to export.');
            let txt = 'PrivateKey | Address | Chain | Balance | FoundAt\n';
            data.forEach(w => {
                txt += `${w.privateKey} | ${w.address} | ${w.chain} | ${w.balance} | ${w.found_at}\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wallets_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ================================================================
        //  AUTO-REFRESH
        // ================================================================
        refreshData();
        setInterval(refreshData, 15000);
    </script>
</body>
</html>
