<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOVERS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg:       #0a0608;
  --surface:  #120d10;
  --card:     #1a1118;
  --border:   #2a1f26;
  --accent:   #c9507a;
  --accent2:  #7c3aed;
  --gold:     #d4a853;
  --text:     #f0e6ec;
  --muted:    #7a6070;
  --bubble-me:   linear-gradient(135deg, #c9507a, #7c3aed);
  --bubble-them: #1e1520;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
}

/* ── LOCK SCREEN ───────────────────────────────────────────────────────── */
#lockScreen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, #1f0a14 0%, #0a0608 70%);
}

.lock-petals {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.petal {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  animation: fall linear infinite;
}
@keyframes fall {
  0%   { opacity: .8; transform: translateY(-20px) scale(1); }
  100% { opacity: 0; transform: translateY(100vh) scale(.3); }
}

.lock-logo {
  font-family: 'Playfair Display', serif;
  font-size: 4rem;
  font-style: italic;
  color: var(--accent);
  letter-spacing: .05em;
  text-shadow: 0 0 60px rgba(201,80,122,.4);
  margin-bottom: .3em;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { text-shadow: 0 0 40px rgba(201,80,122,.3); }
  50%      { text-shadow: 0 0 80px rgba(201,80,122,.7); }
}

.lock-sub {
  color: var(--muted);
  font-size: .85rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  margin-bottom: 3rem;
}

.lock-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem;
  width: 340px;
  display: flex; flex-direction: column; gap: 1rem;
  box-shadow: 0 30px 80px rgba(0,0,0,.6);
}

.lock-box label {
  font-size: .7rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .3rem;
  display: block;
}

.lock-box input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: .9rem 1.2rem;
  color: var(--text);
  font-size: 1.1rem;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: .15em;
  outline: none;
  transition: border-color .2s;
}
.lock-box input:focus { border-color: var(--accent); }

.lock-btn {
  background: var(--bubble-me);
  border: none; border-radius: 12px;
  padding: 1rem;
  color: white;
  font-size: 1rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  margin-top: .5rem;
}
.lock-btn:hover { opacity: .85; }
.lock-btn:active { transform: scale(.98); }
.lock-err { color: var(--accent); font-size: .82rem; text-align: center; display: none; }

/* ── AUTH SCREEN ──────────────────────────────────────────────────────── */
#authScreen {
  position: fixed; inset: 0; z-index: 90;
  display: none;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 30%, #1f0a14 0%, #0a0608 70%);
}

.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.5rem;
  width: 360px;
  box-shadow: 0 30px 80px rgba(0,0,0,.6);
}

.auth-logo {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  font-style: italic;
  color: var(--accent);
  text-align: center;
  margin-bottom: .3em;
}

.auth-tabs {
  display: flex;
  gap: .5rem;
  background: var(--surface);
  border-radius: 12px;
  padding: .3rem;
  margin: 1.5rem 0;
}

.auth-tab {
  flex: 1; padding: .6rem;
  border: none; border-radius: 9px;
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  cursor: pointer;
  transition: all .2s;
}
.auth-tab.active {
  background: var(--card);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}

.auth-field { margin-bottom: 1rem; }
.auth-field label {
  display: block;
  font-size: .7rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .4rem;
}
.auth-field input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: .85rem 1.1rem;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem;
  outline: none;
  transition: border-color .2s;
}
.auth-field input:focus { border-color: var(--accent); }

.auth-btn {
  width: 100%;
  background: var(--bubble-me);
  border: none; border-radius: 12px;
  padding: .95rem;
  color: white;
  font-size: 1rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  margin-top: .5rem;
  transition: opacity .2s;
}
.auth-btn:hover { opacity: .85; }
.auth-err { color: var(--accent); font-size: .82rem; text-align: center; margin-top: .5rem; display: none; }

/* ── MAIN APP ──────────────────────────────────────────────────────────── */
#app {
  display: none;
  height: 100dvh;
  flex-direction: row;
}

/* Sidebar */
.sidebar {
  width: 320px;
  min-width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

.sidebar-header {
  padding: 1.2rem 1.4rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .8rem;
}

.sidebar-logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.5rem;
  color: var(--accent);
  flex: 1;
}

.my-username {
  font-size: .8rem;
  color: var(--muted);
  background: var(--card);
  padding: .3rem .7rem;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.logout-btn {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 1.2rem; padding: .3rem;
  transition: color .2s;
}
.logout-btn:hover { color: var(--accent); }

/* Search bar */
.search-wrap {
  padding: .8rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex; gap: .5rem; align-items: center;
}
.search-wrap input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: .6rem .9rem;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .88rem;
  outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-btn {
  background: var(--accent);
  border: none; border-radius: 10px;
  padding: .6rem .9rem;
  color: white; cursor: pointer;
  font-size: .85rem;
  transition: opacity .2s;
}
.search-btn:hover { opacity: .8; }

/* Search results */
#searchResults {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: none;
  max-height: 200px;
  overflow-y: auto;
}

.search-result-item {
  padding: .7rem 1rem;
  display: flex; align-items: center; gap: .8rem;
  cursor: pointer;
  transition: background .15s;
  border-bottom: 1px solid var(--border);
}
.search-result-item:hover { background: var(--surface); }

/* Requests badge */
.req-badge {
  background: var(--accent);
  color: white;
  font-size: .65rem;
  padding: .15rem .4rem;
  border-radius: 10px;
  margin-left: auto;
}

/* Friends list */
.friends-list {
  flex: 1;
  overflow-y: auto;
  padding: .5rem 0;
}

.friend-item {
  padding: .8rem 1.1rem;
  display: flex; align-items: center; gap: .9rem;
  cursor: pointer;
  transition: background .15s;
  border-radius: 10px;
  margin: .15rem .5rem;
}
.friend-item:hover, .friend-item.active { background: var(--card); }

.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--bubble-me);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  font-weight: 600;
  color: white;
  position: relative;
  flex-shrink: 0;
}
.online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 10px; height: 10px;
  background: #22c55e;
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.friend-info { flex: 1; overflow: hidden; }
.friend-name { font-size: .9rem; font-weight: 500; }
.friend-last { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.unread-badge {
  background: var(--accent);
  color: white;
  font-size: .65rem;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* Requests panel */
#requestsPanel {
  display: none;
  padding: .5rem;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.req-title {
  font-size: .7rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  padding: .5rem;
}
.req-item {
  display: flex; align-items: center; gap: .7rem;
  padding: .6rem .5rem;
}
.req-item .avatar { width: 34px; height: 34px; font-size: .9rem; }
.req-actions { display: flex; gap: .4rem; margin-left: auto; }
.req-accept, .req-reject {
  border: none; border-radius: 7px;
  padding: .3rem .7rem;
  font-size: .78rem;
  cursor: pointer;
  transition: opacity .2s;
}
.req-accept { background: var(--accent); color: white; }
.req-reject { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
.req-accept:hover, .req-reject:hover { opacity: .8; }

/* ── CHAT AREA ──────────────────────────────────────────────────────────── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  background: var(--bg);
}

.chat-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted);
  gap: 1rem;
}
.chat-empty-logo {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 3rem;
  color: var(--border);
}

.chat-header {
  padding: 1rem 1.4rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 1rem;
  background: var(--surface);
}

.chat-header-info { flex: 1; }
.chat-header-name { font-weight: 500; font-size: 1rem; }
.chat-header-status { font-size: .75rem; color: var(--muted); }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.msg-wrap {
  display: flex;
  flex-direction: column;
  max-width: 70%;
}
.msg-wrap.me { align-self: flex-end; align-items: flex-end; }
.msg-wrap.them { align-self: flex-start; }

.bubble {
  padding: .6rem .95rem;
  border-radius: 18px;
  font-size: .9rem;
  line-height: 1.5;
  word-break: break-word;
  position: relative;
}
.me .bubble {
  background: var(--bubble-me);
  border-bottom-right-radius: 4px;
  color: white;
}
.them .bubble {
  background: var(--bubble-them);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

.bubble img {
  max-width: 260px;
  max-height: 300px;
  border-radius: 10px;
  cursor: pointer;
  display: block;
}
.bubble video {
  max-width: 280px;
  border-radius: 10px;
  display: block;
}

/* Voice */
.voice-player {
  display: flex; align-items: center; gap: .7rem;
  min-width: 180px;
}
.voice-play {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,.2);
  border: none;
  color: white;
  cursor: pointer;
  font-size: .9rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.voice-play:hover { background: rgba(255,255,255,.35); }
.voice-bar {
  flex: 1; height: 3px;
  background: rgba(255,255,255,.3);
  border-radius: 2px;
  overflow: hidden;
}
.voice-fill { height: 100%; width: 0%; background: white; transition: width .1s; }
.voice-dur { font-size: .7rem; opacity: .7; white-space: nowrap; }

.msg-time { font-size: .65rem; color: var(--muted); margin-top: .2rem; padding: 0 .2rem; }

.typing-indicator {
  display: none;
  padding: .4rem .8rem;
  color: var(--muted);
  font-size: .8rem;
  font-style: italic;
}

/* Input area */
.input-area {
  padding: .9rem 1.1rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: flex-end; gap: .6rem;
}

.attach-btn, .voice-btn, .send-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  flex-shrink: 0;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.attach-btn { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
.attach-btn:hover { color: var(--text); }
.voice-btn { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
.voice-btn:hover { color: var(--accent); }
.voice-btn.recording { background: var(--accent); color: white; animation: recPulse .8s ease-in-out infinite; }
@keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.send-btn { background: var(--bubble-me); color: white; }
.send-btn:hover { opacity: .85; }

.msg-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: .6rem 1rem;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  outline: none;
  resize: none;
  min-height: 40px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color .2s;
}
.msg-input:focus { border-color: var(--accent); }

#fileInput { display: none; }

/* File preview */
.file-preview {
  display: none;
  padding: .5rem 1.1rem;
  background: var(--surface);
  border-top: 1px solid var(--border);
  align-items: center; gap: .8rem;
  font-size: .82rem; color: var(--muted);
}
.file-preview.show { display: flex; }
.preview-clear { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; }

/* Lightbox */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.9);
  align-items: center; justify-content: center;
  cursor: pointer;
}
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Mobile */
@media (max-width: 640px) {
  .sidebar { width: 100%; min-width: unset; position: absolute; z-index: 10; transition: transform .3s; }
  .sidebar.hidden { transform: translateX(-100%); }
  .chat-area { width: 100%; }
  #backBtn { display: flex !important; }
}

#backBtn {
  display: none;
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 1.3rem; margin-right: .3rem;
}
</style>
</head>
<body>

<!-- ── LOCK SCREEN ─────────────────────────────────────────────────── -->
<div id="lockScreen">
  <div class="lock-petals" id="petals"></div>
  <div class="lock-logo">LOVERS</div>
  <div class="lock-sub">Private Messenger</div>
  <div class="lock-box">
    <div>
      <label>Enter Access Code</label>
      <input type="password" id="lockInput" placeholder="••••••" maxlength="20"
        onkeydown="if(event.key==='Enter')checkLock()"/>
    </div>
    <button class="lock-btn" onclick="checkLock()">Enter →</button>
    <div class="lock-err" id="lockErr">Wrong code. Try again.</div>
  </div>
</div>

<!-- ── AUTH SCREEN ─────────────────────────────────────────────────── -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">LOVERS</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <div id="loginForm">
      <div class="auth-field"><label>Username</label><input id="loginUser" type="text" placeholder="your_username"/></div>
      <div class="auth-field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••"/></div>
      <button class="auth-btn" onclick="doLogin()">Login</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-field"><label>Username</label><input id="regUser" type="text" placeholder="choose_username"/></div>
      <div class="auth-field"><label>Password</label><input id="regPass" type="password" placeholder="min 4 chars"/></div>
      <button class="auth-btn" onclick="doRegister()">Create Account</button>
    </div>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<!-- ── MAIN APP ────────────────────────────────────────────────────── -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">LOVERS</div>
      <div class="my-username" id="myUsernameLabel">@me</div>
      <button class="logout-btn" onclick="logout()" title="Logout">⏻</button>
    </div>

    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Find user by username…"
        onkeydown="if(event.key==='Enter')doSearch()"/>
      <button class="search-btn" onclick="doSearch()">Find</button>
    </div>

    <div id="searchResults"></div>
    <div id="requestsPanel"></div>

    <div class="friends-list" id="friendsList">
      <div style="padding:2rem;text-align:center;color:var(--muted);font-size:.85rem;">
        Search for users to start chatting 💬
      </div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-logo">LOVERS</div>
      <div style="font-size:.9rem;">Select a conversation to begin</div>
    </div>

    <div id="chatView" style="display:none;flex-direction:column;height:100dvh;flex:1;">
      <div class="chat-header">
        <button id="backBtn" onclick="showSidebar()">←</button>
        <div class="avatar" id="chatAvatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName">-</div>
          <div class="chat-header-status" id="chatStatus">-</div>
        </div>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typingIndicator">typing…</div>

      <div class="file-preview" id="filePreview">
        <span id="previewName">file.jpg</span>
        <button class="preview-clear" onclick="clearFile()">✕</button>
      </div>

      <div class="input-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*" onchange="onFileSelect(this)"/>
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Type a message…"
          onkeydown="handleKey(event)" oninput="autoResize(this);sendTyping()"></textarea>
        <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()">🎤</button>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="document.getElementById('lightbox').style.display='none'">
  <img id="lightboxImg" src=""/>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const ACCESS_CODE = 'LOVERS';
const API = '';

// ── STATE ──────────────────────────────────────────────────────────────────
let token = localStorage.getItem('lv_token') || '';
let me    = JSON.parse(localStorage.getItem('lv_me') || 'null');
let socket = null;
let currentFriend = null;
let pendingFile   = null;
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let typingTimer   = null;
let friends       = [];
let unreadMap     = {};

// ── LOCK SCREEN ────────────────────────────────────────────────────────────
(function spawnPetals() {
  const c = document.getElementById('petals');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${3+Math.random()*6}px;
      height:${3+Math.random()*6}px;
      animation-duration:${4+Math.random()*8}s;
      animation-delay:${Math.random()*8}s;
      opacity:${.3+Math.random()*.5};
    `;
    c.appendChild(p);
  }
})();

function checkLock() {
  const val = document.getElementById('lockInput').value.toUpperCase().trim();
  if (val === ACCESS_CODE) {
    document.getElementById('lockScreen').style.display = 'none';
    if (token && me) { initApp(); }
    else { document.getElementById('authScreen').style.display = 'flex'; }
  } else {
    const err = document.getElementById('lockErr');
    err.style.display = 'block';
    document.getElementById('lockInput').value = '';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLock();
});

// ── AUTH ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0)====(tab==='login')));
  document.getElementById('loginForm').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
  document.getElementById('authErr').style.display = 'none';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  await authRequest('/api/auth/login', { username, password });
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  await authRequest('/api/auth/register', { username, password });
}

async function authRequest(url, body) {
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) { showAuthErr(d.error); return; }
    token = d.token; me = d.user;
    localStorage.setItem('lv_token', token);
    localStorage.setItem('lv_me', JSON.stringify(me));
    document.getElementById('authScreen').style.display = 'none';
    initApp();
  } catch(e) { showAuthErr('Network error'); }
}

function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  if (socket) socket.disconnect();
  localStorage.removeItem('lv_token');
  localStorage.removeItem('lv_me');
  token = ''; me = null; currentFriend = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('lockInput').value = '';
}

// ── INIT APP ───────────────────────────────────────────────────────────────
function initApp() {
  document.getElementById('app').style.display = 'flex';
  document.getElementById('myUsernameLabel').textContent = '@' + me.username;

  // Socket
  socket = io({ auth: { token } });

  socket.on('new_message', (msg) => {
    const convId = [me.id, currentFriend?.id].sort().join('_');
    if (currentFriend && msg.conversationId === convId) {
      appendMessage(msg);
      scrollBottom();
    } else {
      // Unread badge
      const senderId = msg.sender._id || msg.sender;
      unreadMap[senderId] = (unreadMap[senderId] || 0) + 1;
      renderFriends();
    }
  });

  socket.on('typing', ({ fromUserId, typing }) => {
    if (currentFriend && fromUserId === currentFriend.id) {
      document.getElementById('typingIndicator').style.display = typing ? 'block' : 'none';
    }
  });

  socket.on('user_online', ({ userId, online }) => {
    friends = friends.map(f => f._id === userId ? { ...f, online } : f);
    renderFriends();
    if (currentFriend && currentFriend.id === userId) {
      document.getElementById('chatStatus').textContent = online ? '🟢 Online' : 'Offline';
    }
  });

  loadFriends();
}

// ── FRIENDS ────────────────────────────────────────────────────────────────
async function loadFriends() {
  try {
    const r = await apiFetch('/api/users/friends');
    friends = r.friends || [];
    renderFriends();
    renderRequests(r.requests || []);
  } catch {}
}

function renderFriends() {
  const el = document.getElementById('friendsList');
  if (!friends.length) {
    el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted);font-size:.85rem;">No friends yet — search to add!</div>';
    return;
  }
  el.innerHTML = friends.map(f => `
    <div class="friend-item ${currentFriend?.id===f._id?'active':''}" onclick="openChat('${f._id}','${f.username}',${f.online})">
      <div class="avatar">
        ${f.username[0].toUpperCase()}
        ${f.online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="friend-info">
        <div class="friend-name">@${f.username}</div>
        <div class="friend-last">${f.online ? 'Online' : 'Offline'}</div>
      </div>
      ${unreadMap[f._id] ? `<div class="unread-badge">${unreadMap[f._id]}</div>` : ''}
    </div>
  `).join('');
}

function renderRequests(reqs) {
  const panel = document.getElementById('requestsPanel');
  if (!reqs.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  panel.innerHTML = `<div class="req-title">Friend Requests (${reqs.length})</div>` +
    reqs.map(r => `
      <div class="req-item">
        <div class="avatar" style="width:34px;height:34px;font-size:.9rem;">${r.username[0].toUpperCase()}</div>
        <span style="font-size:.85rem;">@${r.username}</span>
        <div class="req-actions">
          <button class="req-accept" onclick="acceptReq('${r._id}')">✓</button>
          <button class="req-reject" onclick="rejectReq('${r._id}')">✕</button>
        </div>
      </div>
    `).join('');
}

async function acceptReq(id) {
  await apiFetch(`/api/users/friend-request/${id}/accept`, 'POST');
  loadFriends();
}
async function rejectReq(id) {
  await apiFetch(`/api/users/friend-request/${id}/reject`, 'POST');
  loadFriends();
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const results = await apiFetch(`/api/users/search/${encodeURIComponent(q)}`);
  const el = document.getElementById('searchResults');
  if (!results.length) {
    el.style.display = 'block';
    el.innerHTML = '<div style="padding:.8rem 1rem;color:var(--muted);font-size:.82rem;">No users found</div>';
    return;
  }
  el.style.display = 'block';
  el.innerHTML = results.map(u => {
    const isFriend = friends.some(f => f._id === u._id);
    return `
      <div class="search-result-item">
        <div class="avatar" style="width:34px;height:34px;font-size:.9rem;">${u.username[0].toUpperCase()}</div>
        <span style="font-size:.88rem;">@${u.username}</span>
        ${isFriend
          ? `<span style="margin-left:auto;font-size:.75rem;color:var(--muted);">Friends ✓</span>`
          : `<button onclick="sendReq('${u._id}')" style="margin-left:auto;background:var(--accent);border:none;border-radius:8px;padding:.3rem .7rem;color:white;font-size:.78rem;cursor:pointer;">Add</button>`
        }
      </div>
    `;
  }).join('');
}

async function sendReq(id) {
  try {
    await apiFetch(`/api/users/friend-request/${id}`, 'POST');
    document.getElementById('searchResults').innerHTML =
      '<div style="padding:.8rem 1rem;color:#22c55e;font-size:.82rem;">✓ Request sent!</div>';
    setTimeout(() => { document.getElementById('searchResults').style.display='none'; }, 2000);
  } catch(e) {
    alert(e.message);
  }
}

// ── OPEN CHAT ──────────────────────────────────────────────────────────────
async function openChat(id, username, online) {
  currentFriend = { id, username, online };
  unreadMap[id] = 0;
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchInput').value = '';

  // Header
  document.getElementById('chatAvatar').textContent = username[0].toUpperCase();
  document.getElementById('chatName').textContent = '@' + username;
  document.getElementById('chatStatus').textContent = online ? '🟢 Online' : 'Offline';

  // Show chat
  document.getElementById('chatEmpty').style.display = 'none';
  document.getElementById('chatView').style.display  = 'flex';

  renderFriends();

  // Mobile: hide sidebar
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('hidden');
  }

  // Load messages
  const msgs = await apiFetch(`/api/users/messages/${id}`);
  const el = document.getElementById('messages');
  el.innerHTML = '';
  msgs.forEach(m => appendMessage(m));
  scrollBottom();
}

function showSidebar() {
  document.getElementById('sidebar').classList.remove('hidden');
}

// ── MESSAGES ───────────────────────────────────────────────────────────────
function appendMessage(msg) {
  const el    = document.getElementById('messages');
  const isMine = (msg.sender._id || msg.sender) === me.id;
  const wrap  = document.createElement('div');
  wrap.className = `msg-wrap ${isMine ? 'me' : 'them'}`;

  const time = new Date(msg.createdAt).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  let inner = '';

  if (msg.type === 'text') {
    inner = `<div class="bubble">${escHtml(msg.content)}</div>`;
  } else if (msg.type === 'image') {
    inner = `<div class="bubble"><img src="${msg.content}" loading="lazy" onclick="openLightbox('${msg.content}')"/></div>`;
  } else if (msg.type === 'video') {
    inner = `<div class="bubble"><video src="${msg.content}" controls preload="metadata"></video></div>`;
  } else if (msg.type === 'voice') {
    inner = `<div class="bubble">
      <div class="voice-player">
        <button class="voice-play" onclick="playVoice(this,'${msg.content}')">▶</button>
        <div class="voice-bar"><div class="voice-fill"></div></div>
        <span class="voice-dur">0:00</span>
      </div>
    </div>`;
  }

  wrap.innerHTML = inner + `<div class="msg-time">${time}</div>`;
  el.appendChild(wrap);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}

// Voice playback
let currentAudio = null;
function playVoice(btn, src) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const wrap = btn.closest('.voice-player');
  const fill = wrap.querySelector('.voice-fill');
  const dur  = wrap.querySelector('.voice-dur');
  const audio = new Audio(src);
  currentAudio = audio;
  btn.textContent = '⏸';
  audio.play();
  audio.ontimeupdate = () => {
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    fill.style.width = pct + '%';
    const s = Math.floor(audio.currentTime);
    dur.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  };
  audio.onended = () => { btn.textContent = '▶'; fill.style.width = '0%'; };
}

// ── SEND MESSAGE ───────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMsg() {
  if (!currentFriend) return;

  if (pendingFile) {
    await uploadAndSend();
    return;
  }

  const text = document.getElementById('msgInput').value.trim();
  if (!text) return;
  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';

  socket.emit('send_message', { toUserId: currentFriend.id, type: 'text', content: text });
}

// File
function onFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  pendingFile = file;
  document.getElementById('previewName').textContent = `📎 ${file.name}`;
  document.getElementById('filePreview').classList.add('show');
}

function clearFile() {
  pendingFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').classList.remove('show');
}

async function uploadAndSend() {
  const file = pendingFile;
  clearFile();

  const form = new FormData();
  form.append('file', file);

  try {
    const r = await fetch('/api/users/upload', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: form
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);

    let type = 'image';
    if (file.type.startsWith('video')) type = 'video';
    else if (file.type.startsWith('audio')) type = 'voice';

    socket.emit('send_message', {
      toUserId: currentFriend.id,
      type,
      content: d.path,
      fileName: d.name
    });
  } catch(e) { alert('Upload failed: ' + e.message); }
}

// Typing
function sendTyping() {
  if (!currentFriend) return;
  socket.emit('typing', { toUserId: currentFriend.id, typing: true });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    socket.emit('typing', { toUserId: currentFriend.id, typing: false });
  }, 1500);
}

// ── VOICE RECORDING ────────────────────────────────────────────────────────
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const file = new File([blob], `voice_${Date.now()}.webm`, { type: 'audio/webm' });
      pendingFile = file;
      document.getElementById('previewName').textContent = '🎤 Voice message (tap send)';
      document.getElementById('filePreview').classList.add('show');
    };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('voiceBtn').classList.add('recording');
  } catch(e) {
    alert('Microphone access needed for voice messages.');
  }
}

function stopRecording() {
  mediaRecorder?.stop();
  isRecording = false;
  document.getElementById('voiceBtn').classList.remove('recording');
}

// ── API HELPER ─────────────────────────────────────────────────────────────
async function apiFetch(url, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { Authorization: 'Bearer ' + token }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(url, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Error');
  return d;
}
