<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 BruteForce Farm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            background: #0a0c10;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .header h1 {
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            font-size: 1.5rem;
        }
        .status {
            background: #00ff88;
            color: #0a0c10;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 700;
            animation: pulse 1.8s infinite;
            font-size: 0.8rem;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #14181f;
            padding: 12px 14px;
            border-radius: 10px;
            border-left: 3px solid #00ff88;
        }
        .stat-box .num {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .stat-box .lbl {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
        }
        .stat-box .num.found {
            color: #00ff88;
        }
        .stat-box .num.error {
            color: #ff6b6b;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 450px;
            overflow-y: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        th {
            text-align: left;
            padding: 8px;
            color: #888;
            border-bottom: 1px solid #1e232c;
            position: sticky;
            top: 0;
            background: #14181f;
            font-size: 0.6rem;
            text-transform: uppercase;
        }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid #1a1f28;
        }
        .addr-cell {
            color: #66d9ff;
        }
        .key-cell {
            color: #ffaa66;
        }
        .bal-pos {
            color: #00ff88;
            font-weight: 600;
        }
        .chain-badge {
            background: #2a2f3a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .actions button {
            background: #1e232c;
            border: 1px solid #2a2f3a;
            color: #ccc;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .actions .export-btn {
            background: #00ff88;
            color: #0a0c10;
            border: none;
            font-weight: 700;
        }
        .actions .export-btn:hover {
            background: #00cc6a;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.6rem;
            color: #3a3f4a;
            text-align: center;
            border-top: 1px solid #1e232c;
            padding-top: 14px;
        }
        .backend-status {
            font-size: 0.7rem;
            color: #888;
            margin: 6px 0;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2f3a;
        }
        .refreshing {
            opacity: 0.5;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.1rem;
            }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔓 BruteForce Farm <span style="font-size:0.6rem;color:#888;">GitHub Pages</span></h1>
            <span class="status"><i class="fas fa-circle"></i> 24x7</span>
        </div>

        <div class="backend-status" id="backendStatus">
            ⏳ Connecting to backend...
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-box"><div class="num" id="statGenerated">0</div><div class="lbl">Generated</div></div>
            <div class="stat-box"><div class="num" id="statScanned">0</div><div class="lbl">Scanned</div></div>
            <div class="stat-box"><div class="num found" id="statFound">0</div><div class="lbl">Found</div></div>
            <div class="stat-box"><div class="num" id="statSpeed">0</div><div class="lbl">Wallets/min</div></div>
            <div class="stat-box"><div class="num" id="statRuntime">0s</div><div class="lbl">Runtime</div></div>
            <div class="stat-box"><div class="num error" id="statErrors">0</div><div class="lbl">Errors</div></div>
        </div>

        <div class="actions">
            <button class="export-btn" onclick="exportWallets()"><i class="fas fa-file-export"></i> Export All (TXT)</button>
            <button onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Private Key</th>
                        <th>Address</th>
                        <th>Chain</th>
                        <th>Balance</th>
                        <th>Found At</th>
                    </tr>
                </thead>
                <tbody id="foundTableBody">
                    <tr><td colspan="6" style="text-align:center;color:#4a4f5a;padding:20px;">Loading wallets from backend...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <i class="fas fa-skull"></i> Frontend: GitHub Pages &bull; Backend: Render/Railway &bull;
            <span id="walletCountFooter">0</span> wallets found
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script>
        // ================================================================
        //  🔥 CHANGE THIS TO YOUR BACKEND URL
        // ================================================================
        const API_BASE = 'https://lovers-9r9m.onrender.com'; // <-- CHANGE THIS

        // ================================================================
        //  API HELPERS
        // ================================================================
        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(API_BASE + endpoint, {
                    signal: AbortSignal.timeout(10000)
                });
                if (!res.ok) throw new Error('API error: ' + res.status);
                return await res.json();
            } catch (e) {
                console.error('API error:', e);
                document.getElementById('backendStatus').innerHTML = '❌ Backend unreachable. Check URL: ' + API_BASE;
                document.getElementById('backendStatus').style.color = '#ff6b6b';
                return null;
            }
        }

        // ================================================================
        //  LOAD DATA
        // ================================================================
        async function loadStats() {
            const data = await fetchAPI('/api/stats');
            if (data) {
                document.getElementById('statGenerated').textContent = data.generated || 0;
                document.getElementById('statScanned').textContent = data.scanned || 0;
                document.getElementById('statFound').textContent = data.found || 0;
                document.getElementById('statSpeed').textContent = data.speed || 0;
                document.getElementById('statRuntime').textContent = (data.runtime || 0) + 's';
                document.getElementById('statErrors').textContent = data.errors || 0;
                document.getElementById('walletCountFooter').textContent = data.wallets_found || 0;
                document.getElementById('backendStatus').innerHTML = '✅ Connected to backend: ' + API_BASE;
                document.getElementById('backendStatus').style.color = '#00ff88';
            }
        }

        async function loadWallets() {
            const data = await fetchAPI('/api/wallets/recent');
            const tbody = document.getElementById('foundTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML =
                    `<tr><td colspan="6" style="text-align:center;color:#4a4f5a;padding:20px;">No wallets found yet. Farm is running on backend...</td></tr>`;
                return;
            }
            let html = '';
            data.forEach((w, i) => {
                const addr = w.address || 'unknown';
                const shortAddr = addr.length > 16 ? addr.slice(0, 12) + '…' + addr.slice(-6) : addr;
                const keyShort = w.privateKey ? w.privateKey.slice(0, 10) + '…' : '—';
                html += `<tr>
                    <td>${i+1}</td>
                    <td class="key-cell" title="${w.privateKey || ''}">${keyShort}</td>
                    <td class="addr-cell" title="${addr}">${shortAddr}</td>
                    <td><span class="chain-badge">${(w.chain || '?').toUpperCase()}</span></td>
                    <td class="bal-pos">${(parseFloat(w.balance) || 0).toFixed(8)}</td>
                    <td style="font-size:0.65rem;color:#6a6f7a;">${w.found_at ? new Date(w.found_at).toLocaleString() : '—'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        async function refreshData() {
            document.body.classList.add('refreshing');
            await Promise.all([loadStats(), loadWallets()]);
            document.body.classList.remove('refreshing');
        }

        // ================================================================
        //  EXPORT
        // ================================================================
        async function exportWallets() {
            const data = await fetchAPI('/api/wallets');
            if (!data || data.length === 0) return alert('No wallets to export.');
            let txt = '# BruteForce Farm — Found Wallets\n';
            txt += '# PrivateKey | Address | Chain | Balance | FoundAt\n\n';
            data.forEach(w => {
                txt += `${w.privateKey} | ${w.address} | ${w.chain} | ${w.balance} | ${w.found_at}\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `found_wallets_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ================================================================
        //  AUTO-REFRESH
        // ================================================================
        refreshData();
        setInterval(refreshData, 15000);

        // Show backend URL on load
        document.getElementById('backendStatus').innerHTML = '⏳ Connecting to: ' + API_BASE;
    </script>
</body>
</html>
