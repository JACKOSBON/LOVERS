<!-- index.html - Crypto Wallet Dashboard -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WalletWatch Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-crypto"></i> WalletWatch</h1>
            <p>Live wallet scraper dashboard — <span id="count">0</span> wallets found</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by address or chain..." />
                <button onclick="filterWallets()"><i class="fas fa-search"></i></button>
            </div>
            <div class="filters">
                <button onclick="filterByChain('all')" class="active">All</button>
                <button onclick="filterByChain('bitcoin')">BTC</button>
                <button onclick="filterByChain('ethereum')">ETH</button>
                <button onclick="filterByChain('bsc')">BSC</button>
                <button onclick="filterByChain('polygon')">POLYGON</button>
                <button onclick="filterByChain('solana')">SOL</button>
                <button onclick="filterByChain('tron')">TRON</button>
                <button onclick="filterByChain('monero')">XMR</button>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <i class="fas fa-coins"></i>
                <span id="totalBalance">0.0000</span>
                <small>Total Balance (USD)</small>
            </div>
            <div class="stat-card">
                <i class="fas fa-link"></i>
                <span id="uniqueWallets">0</span>
                <small>Unique Wallets</small>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <span id="lastUpdate">Never</span>
                <small>Last Update</small>
            </div>
        </div>

        <table id="walletTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Address</th>
                    <th>Chain</th>
                    <th>Balance</th>
                    <th>Found At</th>
                </tr>
            </thead>
            <tbody id="walletBody">
                <!-- Dynamic rows inserted here -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
