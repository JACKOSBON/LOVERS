<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💰 Brute-Force Farm — 24x7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            background: #0a0c10;
            color: #00ff88;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .header .status {
            font-size: 0.8rem;
            background: #00ff88;
            color: #0a0c10;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: 700;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #14181f;
            padding: 14px 18px;
            border-radius: 10px;
            border-left: 3px solid #00ff88;
        }
        .stat-box .num {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .stat-box .lbl {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
        }
        .log-area {
            background: #0b0e14;
            border-radius: 10px;
            padding: 14px;
            max-height: 350px;
            overflow-y: auto;
            font-size: 0.7rem;
            border: 1px solid #1e232c;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            color: #88cc88;
        }
        .log-area .found {
            color: #00ff88;
            font-weight: 700;
        }
        .log-area .key {
            color: #ffaa66;
        }
        .log-area .addr {
            color: #66d9ff;
        }
        .log-area .bal {
            color: #ffdd44;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        th {
            text-align: left;
            padding: 8px 8px;
            color: #888;
            border-bottom: 1px solid #1e232c;
            font-size: 0.6rem;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            background: #14181f;
        }
        td {
            padding: 6px 8px;
            border-bottom: 1px solid #1a1f28;
        }
        .addr-cell {
            color: #66d9ff;
            font-size: 0.7rem;
        }
        .key-cell {
            color: #ffaa66;
            font-size: 0.65rem;
        }
        .bal-pos {
            color: #00ff88;
            font-weight: 600;
        }
        .chain-badge {
            background: #2a2f3a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .actions button {
            background: #1e232c;
            border: 1px solid #2a2f3a;
            color: #ccc;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .actions button:hover {
            background: #2a2f3a;
            color: #fff;
        }
        .actions .export-btn {
            background: #00ff88;
            color: #0a0c10;
            border: none;
            font-weight: 700;
        }
        .actions .export-btn:hover {
            background: #00cc6a;
        }
        .actions .clear-btn {
            background: #ff4444;
            color: #fff;
            border: none;
        }
        .actions .clear-btn:hover {
            background: #cc3333;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #3a3f4a;
            text-align: center;
            border-top: 1px solid #1e232c;
            padding-top: 16px;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0c10;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2f3a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔓 BruteForce Farm</h1>
            <span class="status"><i class="fas fa-circle"></i> LIVE</span>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><div class="num" id="statGenerated">0</div><div class="lbl">Generated</div></div>
            <div class="stat-box"><div class="num" id="statScanned">0</div><div class="lbl">Scanned</div></div>
            <div class="stat-box"><div class="num" id="statFound" style="color:#00ff88;">0</div><div class="lbl">Funded Found</div></div>
            <div class="stat-box"><div class="num" id="statSpeed">0</div><div class="lbl">Wallets/min</div></div>
            <div class="stat-box"><div class="num" id="statRuntime">0s</div><div class="lbl">Runtime</div></div>
        </div>

        <div class="actions">
            <button class="export-btn" onclick="exportFound()"><i class="fas fa-file-export"></i> Export Found (TXT)</button>
            <button class="clear-btn" onclick="clearFound()"><i class="fas fa-trash"></i> Clear Found</button>
            <button onclick="refreshStats()"><i class="fas fa-sync"></i> Refresh</button>
        </div>

        <div class="log-area" id="logArea">[System] Brute-Force Farm initialized. Generating keys...</div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Private Key</th>
                        <th>Address</th>
                        <th>Chain</th>
                        <th>Balance</th>
                        <th>Found At</th>
                    </tr>
                </thead>
                <tbody id="foundTableBody">
                    <tr><td colspan="6" style="text-align:center;color:#4a4f5a;padding:20px;">No funded wallets found yet</td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <i class="fas fa-skull"></i> BruteForce Farm v2.0 &bull; 24x7 &bull; All data in localStorage &bull; 
            <span id="walletCountFooter">0</span> wallets found
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script>
        // ================================================================
        //  CRYPTO FUNCTIONS (Lightweight)
        // ================================================================
        async function sha256(msg) {
            const encoder = new TextEncoder();
            const data = encoder.encode(msg);
            const buf = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const BASE58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';

        function base58Encode(bytes) {
            let num = BigInt('0x' + Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(''));
            let result = '';
            while (num > 0) {
                const rem = Number(num % 58n);
                result = BASE58[rem] + result;
                num = num / 58n;
            }
            return result || '1';
        }

        function generatePrivateKey() {
            const arr = new Uint8Array(32);
            crypto.getRandomValues(arr);
            return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function deriveAddress(privateKey, chain) {
            const hash = await sha256(privateKey);
            if (chain === 'bitcoin') {
                const pubKeyHash = hash.slice(0, 40);
                const withPrefix = '00' + pubKeyHash;
                const checksum = (await sha256(await sha256(withPrefix))).slice(0, 8);
                const hexAddr = withPrefix + checksum;
                const bytes = new Uint8Array(hexAddr.match(/.{2}/g).map(b => parseInt(b, 16)));
                return base58Encode(bytes);
            } else if (chain === 'ethereum' || chain === 'bsc' || chain === 'polygon') {
                return '0x' + hash.slice(-40);
            } else if (chain === 'solana') {
                const bytes = new Uint8Array(hash.slice(0, 44).match(/.{2}/g).map(b => parseInt(b, 16)));
                return base58Encode(bytes);
            } else if (chain === 'tron') {
                return 'T' + hash.slice(0, 33);
            } else if (chain === 'monero') {
                return '4' + hash.slice(0, 94);
            }
            return hash.slice(0, 42);
        }

        // ================================================================
        //  API CONFIG
        // ================================================================
        const API_CONFIG = {
            bitcoin: {
                label: 'BTC',
                endpoints: [(addr) => `https://blockchain.info/balance?active=${addr}`],
                parse: (data, addr) => {
                    if (data.balance !== undefined) return data.balance / 1e8;
                    if (data.data && data.data[addr]) return data.data[addr].balance / 1e8;
                    return null;
                }
            },
            ethereum: {
                label: 'ETH',
                endpoints: [(addr) =>
                    `https://api.etherscan.io/api?module=account&action=balance&address=${addr}&tag=latest&apikey=YourApiKeyToken`
                ],
                parse: (data) => { if (data.result !== undefined) return parseInt(data.result) / 1e18; return null; }
            },
            bsc: {
                label: 'BNB',
                endpoints: [(addr) =>
                    `https://api.bscscan.com/api?module=account&action=balance&address=${addr}&apikey=YourApiKeyToken`
                ],
                parse: (data) => { if (data.result !== undefined) return parseInt(data.result) / 1e18; return null; }
            },
            polygon: {
                label: 'MATIC',
                endpoints: [(addr) =>
                    `https://api.polygonscan.com/api?module=account&action=balance&address=${addr}&apikey=YourApiKeyToken`
                ],
                parse: (data) => { if (data.result !== undefined) return parseInt(data.result) / 1e18; return null; }
            },
            solana: {
                label: 'SOL',
                endpoints: [(addr) => `https://api.solscan.io/account/${addr}`],
                parse: (data) => { if (data.data && data.data.lamports !== undefined) return data.data.lamports / 1e9; return null; }
            },
            tron: {
                label: 'TRX',
                endpoints: [(addr) => `https://api.trongrid.io/v1/accounts/${addr}`],
                parse: (data) => { if (data.balance !== undefined) return data.balance / 1e6; return null; }
            },
            monero: {
                label: 'XMR',
                endpoints: [(addr) => `https://xmrchain.net/api/address/${addr}`],
                parse: (data) => { if (data.balance !== undefined) return data.balance / 1e12; return null; }
            }
        };

        const CHAINS = ['bitcoin', 'ethereum', 'bsc', 'polygon', 'solana', 'tron', 'monero'];

        // ================================================================
        //  STATE
        // ================================================================
        let generatedCount = 0;
        let scannedCount = 0;
        let foundCount = 0;
        let startTime = Date.now();
        let foundWallets = [];
        let running = true;

        const logArea = document.getElementById('logArea');

        function log(msg, type = 'info') {
            const ts = new Date().toLocaleTimeString();
            const cls = type === 'found' ? 'found' : type === 'key' ? 'key' : type === 'addr' ? 'addr' : type === 'bal' ? 'bal' :
                'info';
            logArea.innerHTML += `\n[${ts}] <span class="${cls}">${msg}</span>`;
            logArea.scrollTop = logArea.scrollHeight;
            if (logArea.innerHTML.split('\n').length > 500) {
                logArea.innerHTML = logArea.innerHTML.split('\n').slice(-400).join('\n');
            }
        }

        // ================================================================
        //  SCAN FUNCTION
        // ================================================================
        async function scanAddress(address, chain) {
            const config = API_CONFIG[chain];
            if (!config) return null;
            for (const endpointFn of config.endpoints) {
                try {
                    const url = endpointFn(address);
                    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
                    if (!resp.ok) continue;
                    const data = await resp.json();
                    const balance = config.parse(data, address);
                    if (balance !== null && balance !== undefined) {
                        return balance;
                    }
                } catch (e) {
                    continue;
                }
            }
            return null;
        }

        // ================================================================
        //  GENERATE + SCAN
        // ================================================================
        async function generateAndScan(chain) {
            const privateKey = generatePrivateKey();
            const address = await deriveAddress(privateKey, chain);

            generatedCount++;
            document.getElementById('statGenerated').textContent = generatedCount;

            const balance = await scanAddress(address, chain);
            scannedCount++;
            document.getElementById('statScanned').textContent = scannedCount;

            const balStr = balance !== null ? balance.toFixed(8) : 'ERROR';

            // Log every wallet generated (for transparency)
            log(`${chain.toUpperCase()} | PK: ${privateKey.slice(0,8)}... | Addr: ${address.slice(0,12)}... | Bal: ${balStr}`,
                balance !== null && balance > 0 ? 'found' : 'info');

            if (balance !== null && balance > 0) {
                foundCount++;
                foundWallets.push({
                    address: address,
                    privateKey: privateKey,
                    chain: chain,
                    balance: balance,
                    found_at: new Date().toISOString()
                });
                saveFound();
                log(`💰 FOUND! Full: ${privateKey} | ${address} | ${balance.toFixed(8)} ${chain.toUpperCase()}`, 'found');
                return { address, privateKey, chain, balance, found: true };
            }

            return { address, privateKey, chain, balance: balance || 0, found: false };
        }

        // ================================================================
        //  MAIN LOOP
        // ================================================================
        async function mainLoop() {
            log('🔥 Farm started. Generating and scanning 24x7...', 'info');
            while (running) {
                for (const chain of CHAINS) {
                    if (!running) break;
                    try {
                        await generateAndScan(chain);
                        const elapsed = (Date.now() - startTime) / 1000 / 60;
                        const speed = elapsed > 0 ? Math.round(generatedCount / elapsed) : 0;
                        document.getElementById('statSpeed').textContent = speed;
                        document.getElementById('statRuntime').textContent = Math.floor((Date.now() - startTime) / 1000) +
                            's';
                    } catch (e) {
                        log(`❌ Error on ${chain}: ${e.message}`, 'error');
                    }
                    await new Promise(r => setTimeout(r, 300));
                }
                document.getElementById('walletCountFooter').textContent = foundWallets.length;
                document.getElementById('statFound').textContent = foundWallets.length;
            }
        }

        // ================================================================
        //  STORAGE
        // ================================================================
        function loadFound() {
            try {
                const data = JSON.parse(localStorage.getItem('bruteforce_found')) || [];
                foundWallets = data;
                foundCount = data.length;
            } catch { foundWallets = []; }
            renderTable();
            updateStats();
        }

        function saveFound() {
            localStorage.setItem('bruteforce_found', JSON.stringify(foundWallets));
            renderTable();
            updateStats();
            document.getElementById('walletCountFooter').textContent = foundWallets.length;
        }

        function clearFound() {
            if (confirm('Delete all found wallets?')) {
                foundWallets = [];
                saveFound();
                log('🗑️ All found wallets cleared.', 'info');
            }
        }

        function exportFound() {
            if (foundWallets.length === 0) return alert('No wallets to export.');
            let txt = '# BruteForce Farm — Found Wallets\n';
            txt += '# PrivateKey | Address | Chain | Balance | FoundAt\n\n';
            foundWallets.forEach(w => {
                txt += `${w.privateKey} | ${w.address} | ${w.chain} | ${w.balance} | ${w.found_at}\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `found_wallets_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            log(`📤 Exported ${foundWallets.length} wallets.`, 'info');
        }

        function refreshStats() {
            renderTable();
            updateStats();
            document.getElementById('walletCountFooter').textContent = foundWallets.length;
            log('🔄 Stats refreshed.', 'info');
        }

        // ================================================================
        //  RENDER TABLE
        // ================================================================
        function renderTable() {
            const tbody = document.getElementById('foundTableBody');
            if (foundWallets.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#4a4f5a;padding:20px;">No funded wallets found yet</td></tr>`;
                return;
            }
            let html = '';
            const sorted = [...foundWallets].reverse();
            sorted.forEach((w, i) => {
                const addr = w.address || 'unknown';
                const shortAddr = addr.length > 16 ? addr.slice(0, 12) + '…' + addr.slice(-6) : addr;
                const keyShort = w.privateKey ? w.privateKey.slice(0, 10) + '…' : '—';
                html += `<tr>
                    <td>${i+1}</td>
                    <td class="key-cell" title="${w.privateKey || ''}">${keyShort}</td>
                    <td class="addr-cell" title="${addr}">${shortAddr}</td>
                    <td><span class="chain-badge">${(w.chain || '?').toUpperCase()}</span></td>
                    <td class="bal-pos">${(parseFloat(w.balance) || 0).toFixed(8)}</td>
                    <td style="font-size:0.65rem;color:#6a6f7a;">${w.found_at ? new Date(w.found_at).toLocaleString() : '—'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function updateStats() {
            document.getElementById('statFound').textContent = foundWallets.length;
            document.getElementById('walletCountFooter').textContent = foundWallets.length;
        }

        // ================================================================
        //  KEEP ALIVE
        // ================================================================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !running) {
                running = true;
                mainLoop();
                log('🔄 Page visible again. Resuming farm.', 'info');
            }
        });

        // ================================================================
        //  INIT
        // ================================================================
        loadFound();
        mainLoop();

        // Update runtime every second
        setInterval(() => {
            document.getElementById('statRuntime').textContent = Math.floor((Date.now() - startTime) / 1000) + 's';
        }, 1000);

        console.log('[BruteForce Farm] 24x7 running.');
    </script>
</body>
</html>
